<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="description" content="Agent Runner — autonomous agent task management">
  <link rel="manifest" href="/manifest.json">
  <title>Agent Runner</title>
  <style>
    /* === Reset & Base === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #1a1a2e;
      --bg-secondary: #16213e;
      --bg-terminal: #0d0d1a;
      --bg-card: #1e1e36;
      --bg-input: #1a1a2e;
      --border: #333;
      --border-focus: #7c8dff;
      --text-primary: #e0e0e0;
      --text-secondary: #aaa;
      --text-muted: #888;
      --text-dim: #666;
      --accent: #7c8dff;
      --success: #4caf50;
      --warning: #ff9800;
      --error: #f44336;
      --warning-bg: #332800;
      --radius: 8px;
      --radius-sm: 4px;
      --tap-min: 44px;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Menlo', 'Consolas', monospace;
    }

    html { height: 100%; }

    body {
      font-family: var(--font-sans);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100%;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      line-height: 1.5;
      font-size: 16px;
      overflow-x: hidden;
    }

    #app { min-height: 100vh; }

    /* === Loading === */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: var(--text-muted);
      font-size: 1rem;
    }

    /* === Typography === */
    h2 { font-size: 1.2rem; font-weight: 600; }
    h3 { font-size: 1rem; font-weight: 600; margin-bottom: 8px; }
    a { color: var(--accent); text-decoration: none; }
    a:active { opacity: 0.7; }

    /* === Header === */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    /* === Main === */
    main {
      max-width: 800px;
      margin: 0 auto;
    }

    /* === Cards === */
    .card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
      background: var(--bg-card);
      cursor: pointer;
      -webkit-tap-highlight-color: rgba(124, 141, 255, 0.15);
      transition: border-color 0.15s ease;
    }

    .card:active { border-color: var(--accent); }

    /* === Badges === */
    .badge {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 500;
      padding: 2px 10px;
      border-radius: 12px;
      color: #fff;
      letter-spacing: 0.02em;
      text-transform: lowercase;
      white-space: nowrap;
    }

    .badge--running { background: var(--success); }
    .badge--waiting { background: var(--warning); }
    .badge--completed { background: var(--text-dim); }
    .badge--failed { background: var(--error); }
    .badge--idle { background: var(--text-dim); }

    /* === Buttons === */
    button {
      font-family: inherit;
      font-size: 0.85rem;
      border: none;
      border-radius: var(--radius-sm);
      padding: 10px 20px;
      min-height: var(--tap-min);
      cursor: pointer;
      color: #fff;
      background: var(--accent);
      transition: opacity 0.15s ease;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    button:active:not(:disabled) { opacity: 0.8; }
    button:disabled { opacity: 0.5; cursor: default; }

    .btn-success { background: var(--success); }
    .btn-danger { background: var(--error); }
    .btn-warning { background: var(--warning); }
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
    }

    .btn-icon {
      width: var(--tap-min);
      height: var(--tap-min);
      padding: 0;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* === Inputs === */
    input[type="text"],
    textarea,
    select {
      font-family: inherit;
      font-size: 0.9rem;
      width: 100%;
      padding: 10px 12px;
      min-height: var(--tap-min);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg-input);
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.15s ease;
      -webkit-appearance: none;
    }

    input[type="text"]:focus,
    textarea:focus,
    select:focus {
      border-color: var(--border-focus);
    }

    textarea {
      resize: vertical;
      line-height: 1.5;
    }

    select {
      padding: 8px 12px;
      cursor: pointer;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    /* === Terminal Output === */
    .terminal {
      background: var(--bg-terminal);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* === Progress Bar === */
    .progress-bar {
      background: var(--border);
      border-radius: var(--radius-sm);
      height: 6px;
      overflow: hidden;
    }

    .progress-bar__fill {
      height: 100%;
      background: var(--success);
      border-radius: var(--radius-sm);
      transition: width 0.3s ease;
    }

    /* === Question Banner === */
    .question-banner {
      padding: 12px;
      margin-bottom: 12px;
      background: var(--warning-bg);
      border: 1px solid var(--warning);
      border-radius: var(--radius);
      font-size: 0.9rem;
    }

    /* === Phase Indicator === */
    .phase-indicator {
      display: flex;
      gap: 4px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .phase-label {
      font-size: 0.75rem;
      padding: 3px 10px;
      border-radius: 12px;
      white-space: nowrap;
    }

    .phase-label--active { background: var(--accent); color: #fff; font-weight: 600; }
    .phase-label--done { background: var(--success); color: #fff; }
    .phase-label--pending { background: var(--border); color: var(--text-muted); }

    /* === Session Row === */
    .session-row {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      min-height: var(--tap-min);
      -webkit-tap-highlight-color: rgba(124, 141, 255, 0.15);
    }

    .session-row:active { background: rgba(124, 141, 255, 0.08); }
    .session-row:last-child { border-bottom: none; }

    /* === Task Item === */
    .task-item {
      padding: 6px 0;
      font-size: 0.85rem;
    }

    /* === Radio / Checkbox (touch-friendly) === */
    input[type="radio"], input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: var(--accent);
    }

    /* === Empty State === */
    .empty-state {
      color: var(--text-muted);
      text-align: center;
      padding: 40px 16px;
      font-size: 0.95rem;
    }

    /* === Error === */
    .error-text { color: var(--error); font-size: 0.85rem; }

    /* === Scrollbar (WebKit) === */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

    /* === Focus === */
    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* === Safe Area (notch devices) === */
    @supports (padding-top: env(safe-area-inset-top)) {
      header {
        padding-top: calc(12px + env(safe-area-inset-top));
        padding-left: calc(16px + env(safe-area-inset-left));
        padding-right: calc(16px + env(safe-area-inset-right));
      }
      main {
        padding-left: calc(16px + env(safe-area-inset-left));
        padding-right: calc(16px + env(safe-area-inset-right));
        padding-bottom: calc(16px + env(safe-area-inset-bottom));
      }
    }

    /* === Responsive === */
    @media (min-width: 640px) {
      main { padding: 24px 32px; }
      .card { padding: 20px; }
      .terminal { font-size: 0.85rem; padding: 12px 16px; }
    }

    @media (min-width: 1024px) {
      main { max-width: 900px; }
    }

    /* === Reduced Motion === */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div id="app"><div class="loading">Loading…</div></div>
  <script type="module" src="/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(function() {});
    }
  </script>
</body>
</html>
